// ═══ GOOGLE DRIVE SYNC ═══
const GDRIVE = {
  CLIENT_ID: '23505544097-vfe1ie75bsoq7aqv05io5nn1l3dla19j.apps.googleusercontent.com',
  SCOPE: 'https://www.googleapis.com/auth/drive.file',
  FILE_NAME: 'phantom_registry_db.json',
  token: null,
  fileId: null,
  syncing: false,
  onStatusChange: null,

  async init() {
    // Try to restore token from sessionStorage
    const saved = sessionStorage.getItem('gdrive_token');
    if (saved) {
      const t = JSON.parse(saved);
      if (t.expires > Date.now()) {
        this.token = t.access_token;
        return true;
      }
    }
    return false;
  },

  login() {
    return new Promise((resolve) => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: this.CLIENT_ID,
        scope: this.SCOPE,
        callback: (resp) => {
          if (resp.error) { resolve(false); return; }
          this.token = resp.access_token;
          sessionStorage.setItem('gdrive_token', JSON.stringify({
            access_token: resp.access_token,
            expires: Date.now() + (resp.expires_in - 60) * 1000
          }));
          resolve(true);
        }
      });
      client.requestAccessToken();
    });
  },

  async findFile() {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${this.FILE_NAME}'+and+trashed=false&spaces=drive&fields=files(id,name,modifiedTime)`,
      { headers: { Authorization: `Bearer ${this.token}` } }
    );
    const d = await r.json();
    if (d.files && d.files.length > 0) {
      this.fileId = d.files[0].id;
      return true;
    }
    return false;
  },

  async readDB() {
    if (!this.token) return null;
    const found = await this.findFile();
    if (!found) return null;
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${this.token}` } }
    );
    if (!r.ok) return null;
    return await r.json();
  },

  async writeDB(data) {
    if (!this.token || this.syncing) return;
    this.syncing = true;
    if (this.onStatusChange) this.onStatusChange('syncing');
    try {
      const body = JSON.stringify(data);
      const blob = new Blob([body], { type: 'application/json' });
      if (!this.fileId) await this.findFile();

      if (this.fileId) {
        // Update existing
        await fetch(
          `https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=media`,
          { method: 'PATCH', headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' }, body }
        );
      } else {
        // Create new
        const meta = JSON.stringify({ name: this.FILE_NAME, mimeType: 'application/json' });
        const form = new FormData();
        form.append('metadata', new Blob([meta], { type: 'application/json' }));
        form.append('file', blob);
        const r = await fetch(
          'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
          { method: 'POST', headers: { Authorization: `Bearer ${this.token}` }, body: form }
        );
        const d = await r.json();
        this.fileId = d.id;
      }
      if (this.onStatusChange) this.onStatusChange('saved');
    } catch(e) {
      console.error('Drive write error:', e);
      if (this.onStatusChange) this.onStatusChange('error');
    } finally {
      this.syncing = false;
    }
  }
};
</script>

const DB="AmputeeRegistry",VER=6;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains("patients"))db.createObjectStore("patients",{keyPath:"id"});if(!db.objectStoreNames.contains("assessments")){const s=db.createObjectStore("assessments",{keyPath:"id"});s.createIndex("pid","pid")}if(!db.objectStoreNames.contains("tfb_sessions")){const s=db.createObjectStore("tfb_sessions",{keyPath:"id"});s.createIndex("pid","pid")}};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function dbAll(s){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(s,"readonly");const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbPut(s,d){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).put(d);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dbDel(s,id){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).delete(id);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

function computeSleepScores(data){
  const scores={dep:0,anx:0,ptsd:0,pain:0};
  SLEEP_QUESTIONS_A.forEach(qDef=>{
    if(qDef.type==="input")return;
    const val=data.a?.[qDef.id];
    if(val==null)return;
    const vals=Array.isArray(val)?val:[val];
    vals.forEach(v=>{const opt=qDef.options.find(o=>o.value===v);if(opt?.scores)Object.entries(opt.scores).forEach(([k,s])=>{scores[k]+=s})});
  });
  const stressorMap=[{anx:1},{pain:1},{dep:0,ptsd:0,pain:1},{ptsd:1},{ptsd:1},{ptsd:1,anx:1},{dep:1},{pain:1},{dep:1}];
  (data.c||[]).forEach((v,i)=>{if(v!=null&&v>=2&&stressorMap[i])Object.entries(stressorMap[i]).forEach(([k])=>{scores[k]+=v>=3?2:1})});
  if(data.d){if(data.d.painWakes==="Так")scores.pain+=2;if(data.d.painWakes==="Іноді")scores.pain+=1;if(data.d.badNight==="Сильніший")scores.pain+=2;if(data.d.goodNight==="Слабший")scores.pain+=1;}
  return scores;
}
function getSleepDominant(scores){
  const entries=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  if(entries[0][1]===0)return null;
  const names={dep:"Депресивний",anx:"Тривожний",ptsd:"ПТСР",pain:"Больовий"};
  const colors={dep:"#64b5f6",anx:"#e9c46a",ptsd:"#e76f51",pain:"#f4a261"};
  const top=entries[0],second=entries[1];
  if(second[1]>0&&top[1]-second[1]<=2)return{type:"mixed",label:names[top[0]]+" + "+names[second[0]],color:colors[top[0]],keys:[top[0],second[0]]};
  return{type:"single",label:names[top[0]],color:colors[top[0]],keys:[top[0]]};
}
function getSleepPhase(data){
  const tl=data.b||[];const firstBreak=tl.findIndex(v=>v>=2);const firstOnset=data.bFirst;const anchor=firstOnset!=null?firstOnset:firstBreak;const preSleep=data.a?.residual;const bidir=data.d?.badNight==="Сильніший"||data.d?.goodNight==="Слабший";
  if(anchor===0)return{phase:1,label:"Преморбідна інсомнія",desc:"Порушення сну існували до служби — первинний, незалежний фактор ризику дезадаптації.",color:"#e9c46a"};
  if(anchor>=1&&anchor<=4)return{phase:2,label:"Коморбідна реактивна інсомнія",desc:"Точка маніфестації — «"+SLEEP_TIMELINE_PERIODS[anchor]+"». Інсомнія виникла як реакція на службові/бойові фактори.",color:"#64b5f6"};
  if(preSleep==="residual")return{phase:4,label:"Персистуюча (резидуальна) інсомнія",desc:"Основний розлад ремітував, інсомнія зберігається автономно. Показана таргетна терапія сну (CBT-I).",color:"#c8a2ff"};
  if(anchor>=5&&bidir)return{phase:3,label:"Хронічна бідирекційна інсомнія",desc:"Сформовано порочне коло: інсомнія та больовий/психопатологічний синдром взаємно потенціюють один одного.",color:"#e76f51"};
  if(anchor>=5)return{phase:2,label:"Коморбідна інсомнія (ризик хронізації)",desc:"Точка маніфестації — «"+SLEEP_TIMELINE_PERIODS[anchor]+"». Наявні ознаки переходу до хронічної фази.",color:"#2a9d8f"};
  return{phase:0,label:"Недостатньо даних",desc:"Заповніть секції A–D.",color:"#666"};
}
function getSleepBidirectional(data){
  if(!data.d)return null;
  const bad=data.d.badNight==="Сильніший";const good=data.d.goodNight==="Слабший";
  if(bad&&good)return{type:"full",label:"Повне порочне коло: сон↔біль",color:"#e76f51"};
  if(bad)return{type:"partial",label:"Сон→біль (поганий сон посилює біль)",color:"#f4a261"};
  if(good)return{type:"partial",label:"Сон→біль (гарний сон зменшує біль)",color:"#2a9d8f"};
  return{type:"none",label:"Бідирекційність не виявлена",color:"#666"};
}
function generateSleepConclusion(data){
  const scores=computeSleepScores(data);const dom=getSleepDominant(scores);const phase=getSleepPhase(data);const bidir=getSleepBidirectional(data);
  let p=[];
  if(data.a?.sleepHours)p.push("Тривалість сну: "+data.a.sleepHours+" год.");
  if(dom)p.push("Порушення сну "+(dom.type==="mixed"?"змішаного":"переважно")+" "+dom.label.toLowerCase()+" ґенезу.");
  if(phase.phase>0)p.push(phase.label+". "+phase.desc);
  if(bidir&&bidir.type!=="none")p.push(bidir.label+".");
  const sv=data.c||[];const topS=sv.map((v,i)=>({v,l:SLEEP_STRESSORS[i]})).filter(s=>s.v>=3).sort((a,b)=>b.v-a.v);
  if(topS.length)p.push("Домінуючі стресори: "+topS.map(s=>s.l.split("(")[0].trim().toLowerCase()).join(", ")+".");
  if(data.d?.painTypes?.length)p.push("Біль що порушує сон: "+data.d.painTypes.join(", ").toLowerCase()+".");
  return p.join(" ");
}

function iCSSRS(d){
  if(!d)return{level:"none",t:"Не оцінено",c:"#555"};
  if(d.q6recent==="Так")return{level:"imminent",t:"Невідкладний ризик",c:"#ff4444"};

  if(d.q5==="Так"||d.q4==="Так"||d.q3==="Так")return{level:"high",t:"Високий ризик",c:"#e76f51"};
  if(d.q2==="Так")return{level:"moderate",t:"Помірний ризик",c:"#f4a261"};
  if(d.q1==="Так")return{level:"low",t:"Низький ризик",c:"#e9c46a"};
  const answered=CSSRS_Q.some(q=>d[q.id]!=null);
  if(answered)return{level:"none",t:"Ризик не виявлено",c:"#2a9d8f"};
  return{level:"none",t:"Не оцінено",c:"#555"};
}

function iDEST(ans){
  const valid=ans.filter(a=>a!=null);if(!valid.length)return{mean:0,t:"Не оцінено",c:"#555",pathological:false};
  const mean=valid.reduce((s,v)=>s+v,0)/valid.length;
  if(mean>=30)return{mean:Math.round(mean),t:"Виражена патологічна дисоціація",c:"#e76f51",pathological:true};
  if(mean>=20)return{mean:Math.round(mean),t:"Ймовірна патологічна дисоціація",c:"#f4a261",pathological:true};
  if(mean>=10)return{mean:Math.round(mean),t:"Підвищена дисоціація",c:"#e9c46a",pathological:false};
  return{mean:Math.round(mean),t:"Норма",c:"#2a9d8f",pathological:false};
}

function generatePsiConclusion(psi,asms,pid){
  if(!psi)return"";
  const p=[];
  // PCL-5
  const pcl5ans=psi.pcl5||[];const pcl5total=pcl5ans.filter(a=>a!=null).reduce((s,v)=>s+v,0);
  const pcl5filled=pcl5ans.filter(a=>a!=null).length;
  if(pcl5filled>=20){const ip=iPCL5(pcl5total);p.push(`PCL-5: ${pcl5total}/80 (${ip.t.toLowerCase()}).`)}
  // HADS
  const hadsAns=psi.hads||[];const hFilled=hadsAns.filter(a=>a!=null).length;
  if(hFilled>=14){
    const tS=HADS.reduce((s,h,i)=>h.s==="Т"&&hadsAns[i]!=null?s+h.sc[hadsAns[i]]:s,0);
    const dS=HADS.reduce((s,h,i)=>h.s==="Д"&&hadsAns[i]!=null?s+h.sc[hadsAns[i]]:s,0);
    const ip=iHADS(tS,dS);
    p.push(`HADS: Т=${tS}/21 (${ip.t.t.toLowerCase()}), Д=${dS}/21 (${ip.d.t.toLowerCase()}).`);
  }
  // C-SSRS
  const cssrs=psi.cssrs||{};const cssrsR=iCSSRS(cssrs);
  if(cssrsR.level!=="none"||CSSRS_Q.some(q=>cssrs[q.id]!=null))p.push(`Суїцидальний ризик (C-SSRS): ${cssrsR.t.toLowerCase()}.`);
  // DES-T
  const destAns=psi.dest||[];const destR=iDEST(destAns);
  if(destAns.filter(a=>a!=null).length>=4)p.push(`Дисоціація (DES-T): M=${destR.mean}% (${destR.t.toLowerCase()}).`);
  // MoCA
  if(psi.moca!=null&&psi.moca!=="")p.push(`MoCA: ${psi.moca}/30${psi.moca<26?" (когнітивний дефіцит)":""}.`);
  // LEC-5 summary
  const lec=psi.lec5||[];const directTrauma=lec.filter(e=>e&&e.includes(0)).length;
  const witnessed=lec.filter(e=>e&&e.includes(1)).length;
  if(directTrauma>0||witnessed>0){
    const parts=[];
    if(directTrauma>0)parts.push(`${directTrauma} прямих травматичних подій`);
    if(witnessed>0)parts.push(`${witnessed} як свідок`);
    p.push(`LEC-5: ${parts.join(", ")}.`);
  }
  return p.join(" ");
}

const DOG_GEN4={cerebral:["sensCog","sensMotor","modulating"],psychogenic:["psychocog"],spinal:["spinal","muscVisc"],peripheral:["peripheral","stumpPain"]};
const DOG_GEN4_NAMES={cerebral:"Церебральний",psychogenic:"Психогенний",spinal:"Спінальний",peripheral:"Периферичний"};
const DOG_GEN4_COLORS={cerebral:"#64b5f6",psychogenic:"#c8a2ff",spinal:"#e9c46a",peripheral:"#f4a261"};
function iDogLevel(s){if(s<=8)return{t:"Низький",c:"#2a9d8f"};if(s<=16)return{t:"Середній",c:"#e9c46a"};if(s<=24)return{t:"Високий",c:"#f4a261"};return{t:"Домінантний",c:"#e76f51"};}
function calcDogScores(d){
  const bs={};DOG_BLOCKS.forEach(b=>{const ans=d?.blocks?.[b.id]||[];bs[b.id]=ans.filter(a=>a!=null).reduce((s,v)=>s+v,0)});
  const g4={};Object.entries(DOG_GEN4).forEach(([g,ids])=>{g4[g]=Math.max(...ids.map(id=>bs[id]||0))});
  return{bs,g4,exogenous:bs.exogenous||0};
}
function generateDogConclusion(d){
  const{bs,g4,exogenous}=calcDogScores(d);
  const entries=Object.entries(g4).sort((a,b)=>b[1]-a[1]);
  if(entries[0][1]===0)return"";
  const p=[];
  // Визначення домінантного
  const top=entries[0],second=entries[1];
  const isMixed=second&&second[1]>0&&Math.abs(top[1]-second[1])<=2;
  if(isMixed){
    p.push(`Змішаний генез: ${DOG_GEN4_NAMES[top[0]]} (${top[1]}/32) + ${DOG_GEN4_NAMES[second[0]]} (${second[1]}/32).`);
  } else {
    p.push(`Домінуючий генез: ${DOG_GEN4_NAMES[top[0]]} (${top[1]}/32, ${iDogLevel(top[1]).t.toLowerCase()}).`);
    if(second&&second[1]>8)p.push(`Вторинний: ${DOG_GEN4_NAMES[second[0]]} (${second[1]}/32, ${iDogLevel(second[1]).t.toLowerCase()}).`);
  }
  // Провідні фактори
  const factorDetails=[];
  entries.forEach(([g])=>{
    if(g4[g]<=0)return;
    DOG_GEN4[g].forEach(blockId=>{
      if(bs[blockId]>8){
        const block=DOG_BLOCKS.find(b=>b.id===blockId);
        factorDetails.push(`${block.name} (${bs[blockId]}/32, ${iDogLevel(bs[blockId]).t.toLowerCase()})`);
      }
    });
  });

function Chart({data,label,color="#c8a2ff",h:ch=120}){if(!data||!data.length)return <div style={{color:"#444",fontSize:12,padding:8}}>Немає даних</div>;const max=Math.max(...data.map(d=>d.v),1),min=Math.min(...data.map(d=>d.v),0),rng=max-min||1;const w=300,pad=30;const pts=data.map((d,i)=>({x:pad+(i/Math.max(data.length-1,1))*(w-pad*2),y:ch-pad-((d.v-min)/rng)*(ch-pad*2)}));const pathD=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");return <div style={{marginBottom:16}}><div style={{fontSize:12,color:"#8a8f98",marginBottom:4,fontWeight:500}}>{label}</div><svg viewBox={`0 0 ${w} ${ch}`} style={{width:"100%",maxWidth:w}}>{[0,.25,.5,.75,1].map(f=>{const y=ch-pad-f*(ch-pad*2);return <g key={f}><line x1={pad} y1={y} x2={w-pad} y2={y} stroke="#2a2d35" strokeWidth="1"/><text x={pad-4} y={y+4} fill="#555" fontSize="9" textAnchor="end">{Math.round(min+f*rng)}</text></g>})}<path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="4" fill={color}/><text x={p.x} y={ch-6} fill="#555" fontSize="7" textAnchor="middle">{data[i].d?.slice(5)||i+1}</text></g>)}</svg></div>}

function ConsentForm({cur,u}){
const canvasRef=React.useRef(null);
const drawing=React.useRef(false);
const[hasSig,setHasSig]=React.useState(!!cur.consentSignature);

React.useEffect(()=>{
if(!canvasRef.current)return;
const canvas=canvasRef.current;
const ctx=canvas.getContext("2d");
// Ретина-дисплей
const dpr=window.devicePixelRatio||1;
canvas.width=canvas.offsetWidth*dpr;
canvas.height=canvas.offsetHeight*dpr;
ctx.scale(dpr,dpr);
ctx.strokeStyle="#c8a2ff";
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineJoin="round";
// Відновити збережений підпис
if(cur.consentSignature){
const img=new Image();
img.onload=()=>ctx.drawImage(img,0,0,canvas.offsetWidth,canvas.offsetHeight);
img.src=cur.consentSignature;
}
},[]);

const getPos=(e,canvas)=>{
const r=canvas.getBoundingClientRect();
const src=e.touches?e.touches[0]:e;
return{x:src.clientX-r.left,y:src.clientY-r.top};
};

const startDraw=e=>{
e.preventDefault();
drawing.current=true;
const canvas=canvasRef.current;
const ctx=canvas.getContext("2d");
const{x,y}=getPos(e,canvas);
ctx.beginPath();ctx.moveTo(x,y);
};

const draw=e=>{
e.preventDefault();
if(!drawing.current)return;
const canvas=canvasRef.current;
const ctx=canvas.getContext("2d");
const{x,y}=getPos(e,canvas);
ctx.lineTo(x,y);ctx.stroke();
setHasSig(true);
};

const endDraw=e=>{
e.preventDefault();
if(!drawing.current)return;
drawing.current=false;
const sig=canvasRef.current.toDataURL("image/png");
u("consentSignature",sig);
u("consentGiven",true);
if(!cur.consentDate)u("consentDate",new Date().toISOString().slice(0,10));
};

const clear=()=>{
const canvas=canvasRef.current;
const ctx=canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);
setHasSig(false);
u("consentSignature","");
u("consentGiven",false);
};

return <div>

{sessions.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#444",fontSize:13}}>Сесій ТФБ ще немає</div>}
{sessions.map(s=>{

// ═══ WORD EXPORT ═══
async function exportWordDoc(patient, allAsms, conclusionText) {
  const {Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType,Table,TableRow,TableCell,WidthType,BorderStyle,ShadingType}=docx;

  const asms=allAsms.filter(a=>a.pid===patient.id).sort((a,b)=>a.date>b.date?1:-1);
  const gc=calcGenesis(patient);
  const ampStr=Object.entries(patient.amps||{}).filter(([,v])=>v.level)
    .map(([k,v])=>`${LIMBS[k]?.name}: ${v.level}${v.sub?" ("+v.sub+")":""}`).join("\n");

  const H1=(t)=>new Paragraph({text:t,heading:HeadingLevel.HEADING_1,spacing:{before:300,after:120}});
  const H2=(t)=>new Paragraph({text:t,heading:HeadingLevel.HEADING_2,spacing:{before:200,after:80}});
  const Row=(label,val)=>!val?"":new Paragraph({
    children:[new TextRun({text:label+": ",bold:true,size:22}),new TextRun({text:String(val),size:22})],
    spacing:{after:60}
  });
  const Sep=()=>new Paragraph({text:"",border:{bottom:{style:BorderStyle.SINGLE,size:6,color:"CCCCCC"}},spacing:{after:120}});
  const P=(t)=>new Paragraph({text:String(t||""),spacing:{after:80},size:22});

  const nz=(v)=>v||"—";
  const yn=(v)=>v?"Так":"Ні";

  // ── filter out empty strings ──
  const rows=[];
  const add=(label,val)=>{if(val!==undefined&&val!==null&&val!==""&&val!==false){const r=Row(label,val);if(r)rows.push(r);}};

  const children=[
    // ══ ШАПКА ══
    new Paragraph({
      children:[new TextRun({text:"ПСИХОЛОГІЧНА КАРТКА ПАЦІЄНТА",bold:true,size:32,color:"4A2C8F"})],
      alignment:AlignmentType.CENTER,spacing:{after:100}
    }),
    new Paragraph({
      children:[new TextRun({text:`Дата формування: ${new Date().toLocaleDateString("uk-UA")}`,size:20,color:"888888"})],
      alignment:AlignmentType.CENTER,spacing:{after:300}
    }),

    // ══ 1. ЗАГАЛЬНІ ДАНІ ══
    H1("1. ЗАГАЛЬНІ ДАНІ"),
  ];

  add("ПІП",patient.name);
  add("Дата народження",patient.dob||"—");
  add("Вік",patient.dob?calcAge(patient.dob)+" р.":"—");
  add("Стать",patient.sex);
  add("Військова частина",patient.unit?"А"+patient.unit:"");
  add("Палата",patient.ward);
  add("Дата поранення",patient.injDate);
  add("Дата ампутації",patient.ampDate);
  add("Дата поступлення",patient.admDate);
  add("Дата реампутації",patient.reampDate);
  add("Тип ампутації",patient.ampType);
  add("RPNI",yn(patient.rpni));
  add("Критика до стану",patient.crit);
  add("Увага (конц.)",patient.attn);
  add("Скарги",patient.complaints);
  add("Запит пацієнта",patient.request);
  children.push(...rows.splice(0));
  children.push(Sep());

  // ══ 2. АМПУТАЦІЇ ══
  children.push(H1("2. РІВНІ АМПУТАЦІЙ"));
  if(ampStr){children.push(P(ampStr));}else{children.push(P("Не вказано"));}
  children.push(Sep());

  // ══ 3. БОЛЬОВИЙ ПРОФІЛЬ ══
  children.push(H1("3. БОЛЬОВИЙ ПРОФІЛЬ"));
  if(patient.hasFB){
    children.push(H2("Фантомний біль (Ф.Б.)"));
    add("Локалізація",patient.fbLoc); add("VAS",patient.fbVAS+"/10");
    const fbR=Object.entries(patient.fbRhythm||{}).filter(([,v])=>v).map(([k])=>k).join(", ");
    add("Добовий ритм",fbR);
    children.push(...rows.splice(0));
  }
  if(patient.hasFV){
    children.push(H2("Фантомні відчуття (Ф.В.)"));
    add("Локалізація",patient.fvLoc); add("VAS",patient.fvVAS+"/10");
    const fvR=Object.entries(patient.fvRhythm||{}).filter(([,v])=>v).map(([k])=>k).join(", ");
    add("Добовий ритм",fvR);
    children.push(...rows.splice(0));
  }
  if(patient.hasBK){
    children.push(H2("Біль кукси (Б.К.)"));
    add("Локалізація",patient.bkLoc); add("VAS",patient.bkVAS+"/10");
    const bkR=Object.entries(patient.bkRhythm||{}).filter(([,v])=>v).map(([k])=>k).join(", ");
    add("Добовий ритм",bkR);
    children.push(...rows.splice(0));
  }
  if(!patient.hasFB&&!patient.hasFV&&!patient.hasBK){children.push(P("Фантомний біль/відчуття/біль кукси не відзначені"));}
  add("Характер протікання",(patient.painFlow||[]).join(", "));
  add("Травм. спогади",patient.traumMem);
  add("Соматичні реакції",(patient.somReact||[]).join(", "));
  children.push(...rows.splice(0));
  // патологія кукси
  if((patient.stumpPath||[]).length>0){
    children.push(H2("Патологія кукси"));
    add("Виявлено",(patient.stumpPath||[]).join(", "));
    add("Джерело виявлення",(patient.stumpPathSource||[]).join(", "));
    add("Примітка",patient.stumpPathNote);
    children.push(...rows.splice(0));
  }
  children.push(Sep());

  // ══ 4. ГЕНЕЗ БОЛЬОВОГО СИНДРОМУ ══
  children.push(H1("4. ГЕНЕЗ БОЛЬОВОГО СИНДРОМУ"));
  add("Домінуючий генез",gc.dominant);
  add("Периферичний",patient.genPeripheral?.join(", ")||(gc.peripheral>0?`${gc.peripheral} дескр.`:""));
  if(patient.genPeripheralOther) add("Периф. (інше)",patient.genPeripheralOther);
  add("Церебральний",patient.genCerebral?.join(", ")||(gc.cerebral>0?`${gc.cerebral} дескр.`:""));
  if(patient.genCerebralOther) add("Церебр. (інше)",patient.genCerebralOther);
  add("Спінальний",patient.genSpinal?.join(", ")||(gc.spinal>0?`${gc.spinal} дескр.`:""));
  if(patient.genSpinalOther) add("Спін. (інше)",patient.genSpinalOther);
  add("Психогенний",patient.genPsychogenic?.join(", ")||(gc.psychogenic>0?`${gc.psychogenic} дескр.`:""));
  if(patient.genPsychogenicOther) add("Психог. (інше)",patient.genPsychogenicOther);
  children.push(...rows.splice(0));
  children.push(Sep());

  // ══ 5. ТЕСТИ ══
  children.push(H1("5. КЛІНІЧНІ ТЕСТИ"));
  const fmtTests=(data)=>Object.entries(data||{}).filter(([,v])=>v&&v.selected).map(([k,v])=>`${k}${v.reactions&&v.reactions.length?": "+v.reactions.join(", "):""}`).join("\n");
  add("Церебральні тести",fmtTests(patient.cerebTests));
  add("Периферичні тести",fmtTests(patient.perTests));
  add("Психогенні тести",fmtTests(patient.psyTests));
  children.push(...rows.splice(0));
  children.push(Sep());

  // ══ 6. ПСИХІЧНИЙ СТАН ══
  children.push(H1("6. ПСИХІЧНИЙ СТАН"));
  add("Сон (год.)",patient.sleepH);
  add("Засинання",patient.sleepOn);
  add("Пробудження",patient.sleepCont);
  add("Нічні жахи",patient.nightm);
  if(patient.sleepOther) add("Сон (інше)",patient.sleepOther);
  add("Вживання ПАР",patient.subst);
  add("Куріння",patient.smoke);
  add("Суїцидальні думки",patient.suic);
  add("Психотичні розл.",patient.psych);
  add("Досвід",( patient.exp||[]).join(", "));
  add("Симптоматика",(patient.sym||[]).join(", "));
  add("MoCA",patient.moca?`${patient.moca}/30 — ${iMoCA(+patient.moca).t}`:"");
  children.push(...rows.splice(0));
  children.push(Sep());

  // ══ 7. ОПИТУВАННЯ ══
  children.push(H1("7. ІСТОРІЯ ОПИТУВАНЬ"));
  if(asms.length===0){
    children.push(P("Опитувань не проводилось"));
  } else {
    asms.forEach((a,idx)=>{
      children.push(H2(`Опитування ${idx+1} — ${a.date}`));
      if(a.pcl5!=null){const i=iPCL5(a.pcl5);add("PCL-5",`${a.pcl5}/80 — ${i.t}`);}
      if(a.hadsT!=null&&a.hadsD!=null){
        const ih=iHADS(a.hadsT,a.hadsD);
        add("HADS Тривога",`${a.hadsT}/21 — ${ih.t.t}`);
        add("HADS Депресія",`${a.hadsD}/21 — ${ih.d.t}`);
      }
      if(a.ais!=null){add("AIS",`${a.ais}/24 — ${iAIS(a.ais).t}`);}
      if(a.dn4!=null){add("DN-4",`${a.dn4}/10 — ${iDN4(a.dn4).t}`);}
      if(a.moca!=null&&a.moca!==""){add("MoCA (опит.)",`${a.moca}/30`);}
      children.push(...rows.splice(0));
    });
  }
  children.push(Sep());

  // ══ 8. ЗАКЛЮЧЕННЯ ══
  children.push(H1("8. ПСИХОЛОГІЧНЕ ЗАКЛЮЧЕННЯ"));
  const concText=conclusionText||patient.conclusion||"";
  if(concText){
    concText.split("\n").forEach(line=>{
      children.push(new Paragraph({
        children:[new TextRun({text:line,size:22})],
        spacing:{after:60}
      }));
    });
  } else {
    children.push(P("Заключення не сформовано"));
  }
  if(patient.recs){
    children.push(H2("Рекомендації"));
    children.push(P(patient.recs));
  }

  // ══ ПІДПИС ══
  children.push(new Paragraph({text:"",spacing:{before:600}}));
  children.push(new Paragraph({
    children:[new TextRun({text:"Психолог Є. Іордек",size:22})],
    spacing:{after:60}
  }));
  children.push(new Paragraph({
    children:[new TextRun({text:`Дата: ${new Date().toLocaleDateString("uk-UA")}`,size:22})],
  }));

  const doc=new Document({
    styles:{default:{document:{run:{font:"Times New Roman",size:24,language:{value:"uk-UA"}}}}},
    sections:[{
      properties:{page:{margin:{top:1080,right:1080,bottom:1080,left:1440}}},
      children
    }]
  });

  const blob=await Packer.toBlob(doc);
  const fname=`${patient.name||"Пацієнт"}_${new Date().toLocaleDateString("uk-UA").replace(/\./g,"-")}.docx`;
  saveAs(blob,fname);
}

      style={{width:100,padding:"14px",background:"#1e2028",border:"1px solid #2e3038",borderRadius:10,color:"#c8a2ff",fontSize:24,fontWeight:800,textAlign:"center",outline:"none"}}/>

      <div style={{fontSize:14,fontWeight:600,color:ps.moca!=null&&ps.moca!==""&&ps.moca<26?"#e76f51":"#2a9d8f"}}>{ps.moca!=null&&ps.moca!==""?(ps.moca>=26?"Норма":"Когнітивний дефіцит"):"—"}</div>

const resultsTab=<div>
  <Sect title="Зведені результати" color="#c8a2ff">
    <div style={{display:"grid",gap:8}}>
      {(()=>{
        const items=[];
        const pcl5f=pcl5Ans.filter(a=>a!=null).length;
        if(pcl5f>=20)items.push({l:"PCL-5",v:`${pcl5Total}/80`,c:pcl5Ip.c,t:pcl5Ip.t});
        const hf=hadsAns.filter(a=>a!=null).length;
        if(hf>=14){items.push({l:"HADS-Т",v:`${hadsTsc}/21`,c:hadsIp.t.c,t:hadsIp.t.t});items.push({l:"HADS-Д",v:`${hadsDsc}/21`,c:hadsIp.d.c,t:hadsIp.d.t})}
        if(CSSRS_Q.some(q=>cssrs[q.id]!=null))items.push({l:"C-SSRS",v:cssrsR.t,c:cssrsR.c,t:cssrsR.level});
        if(destAns.filter(a=>a!=null).length>=4)items.push({l:"DES-T",v:`M=${destR.mean}%`,c:destR.c,t:destR.t});
        if(ps.moca!=null&&ps.moca!=="")items.push({l:"MoCA",v:`${ps.moca}/30`,c:ps.moca>=26?"#2a9d8f":"#e76f51",t:ps.moca>=26?"Норма":"Дефіцит"});
        const lec5d=ps.lec5.filter(e=>e&&e.includes(0)).length;
        if(lec5d>0)items.push({l:"LEC-5",v:`${lec5d} прямих`,c:"#e76f51",t:`${ps.lec5.filter(e=>e&&e.includes(1)).length} свідок`});
        return items.map(it=><div key={it.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#14151c",borderRadius:8}}>

  <Sect title="Автоматичний висновок" color="#2a9d8f">

<div style={{display:"flex",gap:2,marginBottom:12,overflowX:"auto",flexShrink:0,paddingBottom:4}}>

</div>
{psiTab===0&&lec5Tab}
{psiTab===1&&hadsTab}

</>
}
// ═══ DOG FORM ═══
function DOGForm({cur,u}){
  const dd=cur.dogFBFV||{blocks:{},descriptors:{}};
  const upDog=(fn)=>{const next=fn(dd);u("dogFBFV",next)};
  const setAns=(blockId,qi,val)=>upDog(d=>{const blocks={...d.blocks,[blockId]:[...(d.blocks[blockId]||Array(8).fill(null))]};blocks[blockId][qi]=blocks[blockId][qi]===val?null:val;return{...d,blocks}});
  const togDesc=(blockId,desc)=>upDog(d=>{const descriptors={...d.descriptors,[blockId]:[...(d.descriptors[blockId]||[])]};const arr=descriptors[blockId];if(arr.includes(desc))descriptors[blockId]=arr.filter(x=>x!==desc);else descriptors[blockId]=[...arr,desc];return{...d,descriptors}});

  const scores=useMemo(()=>calcDogScores(dd),[dd]);
  const conclusion=useMemo(()=>generateDogConclusion(dd),[dd]);
  const[dogTab,setDogTab]=useState(0);
  const totalAnswered=DOG_BLOCKS.reduce((s,b)=>{const ans=dd.blocks?.[b.id]||[];return s+ans.filter(a=>a!=null).length},0);

  const blockTabs=[...DOG_BLOCKS.map((b,i)=>({i,label:b.name.split(" ")[0],badge:(dd.blocks?.[b.id]||[]).filter(a=>a!=null).length+"/8"})),{i:9,label:"⚡ Результат"}];

  return <>
  <div style={{padding:"8px 10px",background:"rgba(200,162,255,0.06)",borderRadius:8,marginBottom:10,fontSize:11,color:"#8a8f98",lineHeight:1.4}}>
    ДОГ ФБіФВ — 9 блоків × 8 питань. Заповнено: {totalAnswered}/72
  </div>

  <div style={{display:"flex",gap:2,marginBottom:12,overflowX:"auto",flexShrink:0,paddingBottom:4}}>
    {blockTabs.map(t=><button key={t.i} onClick={()=>setDogTab(t.i)} style={{...S.tab,padding:"5px 8px",fontSize:10,background:dogTab===t.i?"rgba(200,162,255,0.15)":"transparent",color:dogTab===t.i?"#c8a2ff":"#555",fontWeight:dogTab===t.i?600:400,flexShrink:0}}>
      {t.label}{t.badge&&<span style={{marginLeft:2,fontSize:9,opacity:.6}}>{t.badge}</span>}
    </button>)}
  </div>

  {dogTab<9&&(()=>{
    const block=DOG_BLOCKS[dogTab];
    const ans=dd.blocks?.[block.id]||Array(8).fill(null);
    const blockScore=scores.bs[block.id]||0;
    const lvl=iDogLevel(blockScore);
    const selDesc=dd.descriptors?.[block.id]||[];
    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#e8e9ed"}}>{block.name}</div>
          {block.subtitle&&<div style={{fontSize:11,color:"#666",marginTop:2}}>{block.subtitle}</div>}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:18,fontWeight:800,color:lvl.c}}>{blockScore}</div>
          <div style={{fontSize:9,color:lvl.c}}>/32 · {lvl.t}</div>
        </div>
      </div>

      {block.qs.map((q,qi)=>{
        const sel=ans[qi];
        return <div key={qi} style={{marginBottom:12,padding:"10px 12px",background:"#14151c",borderRadius:8,border:"1px solid "+(sel!=null?"#252830":"#1a1c22")}}>
          <div style={{fontSize:12,color:"#d0d2d8",marginBottom:8,lineHeight:1.4}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {q.o.map((opt,oi)=>{
              const isSel=sel===oi;
              const c=oi===0?"#2a9d8f":oi<=1?"#8a8f98":oi<=2?"#e9c46a":oi<=3?"#f4a261":"#e76f51";
              return <button key={oi} onClick={()=>setAns(block.id,qi,oi)} style={{
                padding:"6px 10px",borderRadius:6,border:(isSel?"2px":"1px")+" solid "+(isSel?c:"#2e3038"),
                background:isSel?c+"33":"transparent",color:isSel?c:"#555",fontSize:11,cursor:"pointer",
                textAlign:"left",fontWeight:isSel?600:400,lineHeight:1.3,transition:"all .1s"
              }}><span style={{opacity:.5,marginRight:4}}>{oi}</span> {opt}</button>
            })}
          </div>
        </div>
      })}

      <Sect title="Дескриптори" open={false}>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {block.desc.map(d=>{
            const sel2=selDesc.includes(d);
            return <button key={d} onClick={()=>togDesc(block.id,d)} style={{
              padding:"5px 10px",borderRadius:6,border:"1px solid "+(sel2?"#c8a2ff":"#2e3038"),
              background:sel2?"rgba(200,162,255,0.15)":"transparent",color:sel2?"#c8a2ff":"#555",
              fontSize:11,cursor:"pointer",textAlign:"left"
            }}>{sel2?"✓ ":""}{d}</button>
          })}
        </div>
      </Sect>

      <div style={{display:"flex",gap:8,marginTop:12}}>
        {dogTab>0&&<button onClick={()=>setDogTab(dogTab-1)} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid #2e3038",background:"#1a1c24",color:"#8a8f98",fontSize:12,cursor:"pointer"}}>← {DOG_BLOCKS[dogTab-1]?.name.split(" ")[0]}</button>}
        <button onClick={()=>setDogTab(dogTab+1)} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"rgba(200,162,255,0.15)",color:"#c8a2ff",fontSize:12,cursor:"pointer",fontWeight:600}}>{dogTab<8?DOG_BLOCKS[dogTab+1]?.name.split(" ")[0]+" →":"⚡ Результат →"}</button>
      </div>
    </div>
  })()}

  {dogTab===9&&<div>
    <Sect title="Профіль за 4-генезною моделлю" color="#c8a2ff">
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {Object.entries(DOG_GEN4_NAMES).map(([k,name])=>{
          const val=scores.g4[k]||0;const lvl=iDogLevel(val);
          return <div key={k} style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:val>0?DOG_GEN4_COLORS[k]:"#333"}}>{val}</div>
            <div style={{fontSize:9,color:val>0?DOG_GEN4_COLORS[k]:"#444",fontWeight:600}}>{name.slice(0,5).toUpperCase()}</div>
            <div style={{height:4,borderRadius:2,background:"#1e2028",marginTop:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:Math.min(val/32*100,100)+"%",background:DOG_GEN4_COLORS[k],borderRadius:2,transition:"width .3s"}}/>
            </div>
            <div style={{fontSize:8,color:lvl.c,marginTop:2}}>{lvl.t}</div>
          </div>
        })}
      </div>
      {scores.exogenous>0&&<div style={{padding:"6px 10px",background:"rgba(138,143,152,0.1)",borderRadius:6,fontSize:11,color:"#8a8f98",marginTop:4}}>
        Екзогенні фактори: {scores.exogenous}/32 ({iDogLevel(scores.exogenous).t.toLowerCase()})
      </div>}
    </Sect>

    <Sect title="Деталізація по блоках">
      {DOG_BLOCKS.map(b=>{
        const val=scores.bs[b.id]||0;const lvl=iDogLevel(val);const pct=Math.min(val/32*100,100);
        const genKey=Object.entries(DOG_GEN4).find(([,ids])=>ids.includes(b.id))?.[0];
        const genColor=genKey?DOG_GEN4_COLORS[genKey]:"#8a8f98";
        return <div key={b.id} style={{marginBottom:8,padding:"8px 12px",background:"#14151c",borderRadius:8,border:"1px solid #1e2028"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:12,color:"#d0d2d8",fontWeight:500}}>{b.name}</div>
            <div style={{fontSize:13,fontWeight:700,color:lvl.c}}>{val}/32</div>
          </div>
          <div style={{height:6,borderRadius:3,background:"#1e2028",overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:genColor,borderRadius:3,transition:"width .3s"}}/>
          </div>
          <div style={{fontSize:9,color:genColor,marginTop:2}}>→ {genKey==="exogenous"?"Екзогенний":DOG_GEN4_NAMES[genKey]||""} · {lvl.t}</div>
        </div>
      })}
    </Sect>

    <Sect title="Автоматичний висновок" color="#2a9d8f">
      <div style={{padding:12,background:"#14151c",borderRadius:8,border:"1px solid #252830",fontSize:13,color:"#d0d2d8",lineHeight:1.5,userSelect:"all"}}>
        {conclusion||"Заповніть блоки опитувальника."}
      </div>
      {conclusion&&<button onClick={()=>{navigator.clipboard?.writeText(conclusion)}} style={{marginTop:8,padding:"8px 16px",borderRadius:8,border:"1px solid #2a9d8f",background:"rgba(42,157,143,0.15)",color:"#2a9d8f",cursor:"pointer",fontSize:12,fontWeight:600}}>
        📋 Копіювати

// ═══ MAIN APP ═══
function App(){
const[view,setView]=useState("list");
const[pts,setPts]=useState([]);const[asms,setAsms]=useState([]);
const[tfbSessions,setTfbSessions]=useState([]);
const[cur,setCur]=useState(null);const[curA,setCurA]=useState(null);
const[search,setSearch]=useState("");const[loading,setLoading]=useState(true);
const[fTab,setFTab]=useState(0);const[aTab,setATab]=useState(0);const[ampSubTab,setAmpSubTab]=useState(0);
const ref=useRef();
// ── Drive state ──
const[driveReady,setDriveReady]=useState(false);
const[driveStatus,setDriveStatus]=useState("idle"); // idle|syncing|saved|error|login
const[driveLogging,setDriveLogging]=useState(false);

// Drive status callback
GDRIVE.onStatusChange=(s)=>setDriveStatus(s);

// On mount: try to restore session, else show login
useEffect(()=>{(async()=>{
  const restored=await GDRIVE.init();
  if(restored){
    setDriveReady(true);
    await loadFromDrive();
  } else {
    setDriveStatus("login");
    setLoading(false);
  }
})()},[]);

const loadFromDrive=async()=>{
  setLoading(true);
  try{
    const data=await GDRIVE.readDB();
    if(data&&data.patients&&data.patients.length>0){
      setPts(data.patients||[]);
      setAsms(data.assessments||[]);
      setTfbSessions(data.tfb_sessions||[]);
    }
  }catch(e){console.error("Drive read error:",e);}
  finally{setLoading(false);}
};

const syncToDrive=async(newPts,newAsms,newTfb)=>{
  await GDRIVE.writeDB({
    patients:newPts,
    assessments:newAsms,
    tfb_sessions:newTfb,
    updatedAt:new Date().toISOString()
  });
};

const handleDriveLogin=async()=>{
  setDriveLogging(true);
  const ok=await GDRIVE.login();
  if(ok){
    setDriveReady(true);
    setDriveStatus("idle");
    await loadFromDrive();
  } else {
    setDriveLogging(false);
    setDriveStatus("login");
  }
};

// ── conclusion hooks (must be at top level) ──
const[cBlk,setCBlk]=useState({orient:"",complaints:"",anamn:"",cogn:"",emot:"",sleep:"",pain:"",genesis:"",recs:""});
const[cFinalText,setCFinalText]=useState("");
const[cCopied,setCCopied]=useState(false);
const[cSaved,setCSaved]=useState(false);

useEffect(()=>{if(!driveReady)return;loadFromDrive();},[driveReady]);
const saveP=async p=>{
  await dbPut("patients",p);
  setPts(prev=>{
    const i=prev.findIndex(x=>x.id===p.id);
    const n=i>=0?[...prev.slice(0,i),p,...prev.slice(i+1)]:[...prev,p];
    syncToDrive(n,asms,tfbSessions);
    return n;
  });
};
const saveTFB=async s=>{
  await dbPut("tfb_sessions",s);
  setTfbSessions(prev=>{
    const i=prev.findIndex(x=>x.id===s.id);
    const n=i>=0?[...prev.slice(0,i),s,...prev.slice(i+1)]:[...prev,s];
    syncToDrive(pts,asms,n);
    return n;
  });
};
const delTFB=async id=>{
  await dbDel("tfb_sessions",id);
  setTfbSessions(prev=>{
    const n=prev.filter(x=>x.id!==id);
    syncToDrive(pts,asms,n);
    return n;
  });
};
const delP=async id=>{
  await dbDel("patients",id);
  const nPts=pts.filter(x=>x.id!==id);
  const nAsms=asms.filter(x=>x.pid!==id);
  for(const a of asms.filter(a=>a.pid===id))await dbDel("assessments",a.id);
  setPts(nPts);setAsms(nAsms);
  syncToDrive(nPts,nAsms,tfbSessions);
  setView("list");
};
const saveA=async a=>{
  await dbPut("assessments",a);
  setAsms(prev=>{
    const i=prev.findIndex(x=>x.id===a.id);
    const n=i>=0?[...prev.slice(0,i),a,...prev.slice(i+1)]:[...prev,a];
    syncToDrive(pts,n,tfbSessions);
    return n;

    {hadsTv!=null&&<span style={{color:iHADS(hadsTv,hadsDv??0).t.c}}> | Т:{hadsTv}</span>}
    {hadsDv!=null&&<span style={{color:iHADS(hadsTv??0,hadsDv).d.c}}> | Д:{hadsDv}</span>}
    {aisv!=null&&<span style={{color:iAIS(aisv).c}}> | AIS:{aisv}</span>}
    {dn4v!=null&&<span style={{color:iDN4(dn4v).c}}> | DN4:{dn4v}</span>}
  </div>:<div style={{fontSize:11,color:"#e76f51",marginTop:4}}>⚠ Немає опитувань — частина даних відсутня</div>}
</div>

<BlkSect title="1. Орієнтування / контакт" phrases={orientPhrases} value={cBlk.orient} onChange={v=>cUpd("orient",v)}/>
<BlkSect title="2. Скарги" phrases={complaintPhrases} value={cBlk.complaints} onChange={v=>cUpd("complaints",v)}/>
<BlkSect title="3. Зі слів пацієнта (анамнез)" phrases={anamnPhrases} value={cBlk.anamn} onChange={v=>cUpd("anamn",v)}/>
<BlkSect title="4. Пам'ять, увага, мислення, мова" phrases={cognPhrases} value={cBlk.cogn} onChange={v=>cUpd("cogn",v)}/>
<div style={{marginBottom:16}}>
  <div style={{fontSize:13,fontWeight:600,color:"#c8a2ff",marginBottom:8}}>5. Емоційний фон + опитувальники (авто з Пси)</div>
  {psyAutoConc&&<div style={{padding:"8px 10px",background:"rgba(200,162,255,0.06)",borderRadius:8,marginBottom:8,fontSize:11,color:"#8a8f98",lineHeight:1.4}}>⚡ Автоматичний висновок з вкладки Пси. Можна редагувати.</div>}
  <textarea value={cBlk.emot||""} onChange={e=>cUpd("emot",e.target.value)} placeholder="Емоційний фон та результати опитувальників..." style={{width:"100%",minHeight:80,padding:"10px 12px",background:"#12131a",border:"1px solid #2e3038",borderRadius:8,color:"#e8e9ed",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.5,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="#c8a2ff"} onBlur={e=>e.target.style.borderColor="#2e3038"}/>
  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:6}}>
    {emotPhrases.map(p=><button key={p} onClick={()=>cUpd("emot",(cBlk.emot||"")+(cBlk.emot?" ":"")+p)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #2e3038",background:"transparent",color:"#666",fontSize:10,cursor:"pointer"}}>+ {p.slice(0,30)}{p.length>30?"…":""}</button>)}
  </div>
  {emotAutoText&&cBlk.emot!==emotAutoText&&<button onClick={()=>cUpd("emot",emotAutoText)} style={{marginTop:6,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(200,162,255,0.3)",background:"rgba(200,162,255,0.08)",color:"#c8a2ff",fontSize:11,cursor:"pointer"}}>↺ Відновити авто-висновок</button>}
</div>

<div style={{marginBottom:16}}>
  <div style={{fontSize:13,fontWeight:600,color:"#c8a2ff",marginBottom:8}}>6. Сон (авто-висновок скринінгу)</div>
  {sleepSSConc&&<div style={{padding:"8px 10px",background:"rgba(200,162,255,0.06)",borderRadius:8,marginBottom:8,fontSize:11,color:"#8a8f98",lineHeight:1.4}}>
    ⚡ Автоматичний висновок зі скринінгу сну. Можна редагувати.
  </div>}
  <textarea value={cBlk.sleep||""} onChange={e=>cUpd("sleep",e.target.value)} placeholder="Висновок щодо сну..." style={{width:"100%",minHeight:80,padding:"10px 12px",background:"#12131a",border:"1px solid #2e3038",borderRadius:8,color:"#e8e9ed",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.5,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="#c8a2ff"} onBlur={e=>e.target.style.borderColor="#2e3038"}/>
  {sleepAutoText&&cBlk.sleep!==sleepAutoText&&<button onClick={()=>cUpd("sleep",sleepAutoText)} style={{marginTop:4,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(200,162,255,0.3)",background:"rgba(200,162,255,0.08)",color:"#c8a2ff",fontSize:11,cursor:"pointer"}}>↺ Відновити авто-висновок</button>}
</div>
<BlkSect title="7. Больовий профіль (VAS / DN-4)" phrases={painPhrases} value={cBlk.pain} onChange={v=>cUpd("pain",v)}/>

<div style={{marginBottom:16}}>
  <div style={{fontSize:13,fontWeight:600,color:"#f4a261",marginBottom:8}}>8. Генез больового синдрому (авто-висновок ДОГ ФБіФВ)</div>
  {dogAutoConc&&<div style={{padding:"8px 10px",background:"rgba(244,162,97,0.06)",borderRadius:8,marginBottom:8,fontSize:11,color:"#8a8f98",lineHeight:1.4}}>
    ⚡ Автоматичний висновок з ДОГ ФБіФВ. Можна редагувати.
  </div>}
  <textarea value={cBlk.genesis||""} onChange={e=>cUpd("genesis",e.target.value)} placeholder="Генез больового синдрому..." style={{width:"100%",minHeight:80,padding:"10px 12px",background:"#12131a",border:"1px solid #2e3038",borderRadius:8,color:"#e8e9ed",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.5,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="#f4a261"} onBlur={e=>e.target.style.borderColor="#2e3038"}/>
  {genesisAutoText&&cBlk.genesis!==genesisAutoText&&<button onClick={()=>cUpd("genesis",genesisAutoText)} style={{marginTop:4,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(244,162,97,0.3)",background:"rgba(244,162,97,0.08)",color:"#f4a261",fontSize:11,cursor:"pointer"}}>↺ Відновити авто-висновок</button>}
</div>

<BlkSect title="9. Рекомендації" phrases={recsPhrases} value={cBlk.recs} onChange={v=>cUpd("recs",v)}/>

<button onClick={handleGenerate} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#c8a2ff,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16}}>
  ✦ Сформувати заключення
</button>

{cFinalText&&<div style={{marginBottom:16}}>
  <div style={{fontSize:11,fontWeight:700,color:"#666",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Готовий текст</div>
  <textarea value={cFinalText} onChange={e=>setCFinalText(e.target.value)}
    style={{width:"100%",minHeight:220,padding:"12px",background:"#1a1c24",border:"1px solid #2e3038",borderRadius:10,color:"#e8e9ed",fontSize:12,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.7,boxSizing:"border-box"}}
    onFocus={e=>e.target.style.borderColor="#c8a2ff"} onBlur={e=>e.target.style.borderColor="#2e3038"}
  />
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
    <button onClick={handleCopy} style={{padding:"11px",borderRadius:10,border:"1px solid #2e3038",background:cCopied?"rgba(42,157,143,0.2)":"#1a1c24",color:cCopied?"#2a9d8f":"#c8a2ff",fontWeight:600,fontSize:13,cursor:"pointer"}}>
      {cCopied?"✓ Скопійовано":"📋 Копіювати"}
    </button>
    <button onClick={handleSave} style={{padding:"11px",borderRadius:10,border:"1px solid #2e3038",background:cSaved?"rgba(42,157,143,0.2)":"#1a1c24",color:cSaved?"#2a9d8f":"#e9c46a",fontWeight:600,fontSize:13,cursor:"pointer"}}>
      {cSaved?"✓ Збережено":"💾 Зберегти"}
    </button>
    <button onClick={handlePrint} style={{padding:"11px",borderRadius:10,border:"1px solid #2e3038",background:"#1a1c24",color:"#8a8f98",fontWeight:600,fontSize:13,cursor:"pointer"}}>
      🖨 Друк
    </button>
    <button onClick={()=>exportWordDoc(cur,asms,cFinalText)} style={{padding:"11px",borderRadius:10,border:"1px solid rgba(42,157,143,0.4)",background:"rgba(42,157,143,0.08)",color:"#2a9d8f",fontWeight:600,fontSize:13,cursor:"pointer"}}>
      📄 Word
    </button>
  </div>
</div>}

</div></div></div>}
return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
